name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build & Publish
        run: |
          dotnet publish Flink.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Build Installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: Flink.iss
          options: /DAppVersion=${{ steps.version.outputs.VERSION }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Flink ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            installer/Flink-${{ steps.version.outputs.VERSION }}-Setup.exe
            bin/Release/net9.0-windows/win-x64/publish/Flink.exe
